name: Generate Morning Briefing

on:
  schedule:
    - cron: '30 19 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run (optional)'
        required: false
        default: 'Manual trigger'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Outlook token
        env:
          OUTLOOK_TOKEN_CACHE: ${{ secrets.OUTLOOK_TOKEN_CACHE }}
        run: |
          python3 << 'PYEOF'
          import os, json, sys
          raw = os.environ.get('OUTLOOK_TOKEN_CACHE', '')
          if not raw:
              print('OUTLOOK_TOKEN_CACHE not set — skipping')
              sys.exit(0)
          try:
              parsed = json.loads(raw)
              with open('.outlook_token_cache.bin', 'w') as f:
                  json.dump(parsed, f)
              print('Token written OK — ' + str(len(raw)) + ' chars')
          except Exception as e:
              print('JSON error: ' + str(e) + ' — writing raw')
              with open('.outlook_token_cache.bin', 'w') as f:
                  f.write(raw)
          PYEOF

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OUTLOOK_CLIENT_ID: ${{ secrets.OUTLOOK_CLIENT_ID }}
          OUTLOOK_TENANT_ID: ${{ secrets.OUTLOOK_TENANT_ID }}
          BRIEFING_EMAIL_TO: ${{ secrets.BRIEFING_EMAIL_TO }}
          BRIEFING_EMAIL_GMAIL: ${{ secrets.BRIEFING_EMAIL_GMAIL }}
          BRIEFING_PASSWORD: ${{ secrets.BRIEFING_PASSWORD }}
        run: python briefing.py

      - name: Wrap with password and publish
        env:
          BRIEFING_PASSWORD: ${{ secrets.BRIEFING_PASSWORD }}
        run: |
          OUTPUT=$(ls -td output/*/ 2>/dev/null | head -1)
          if [ -z "$OUTPUT" ]; then
            echo "No output folder found"
            exit 1
          fi
          echo "Output folder: $OUTPUT"
          python wrap_password.py "${OUTPUT}briefing.html" docs/index.html "$BRIEFING_PASSWORD"
          touch docs/.nojekyll
          echo "Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')" > docs/last_run.txt

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
